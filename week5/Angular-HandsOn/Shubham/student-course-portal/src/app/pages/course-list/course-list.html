@if (selectedCourseId) {
<p>
    Selected Course ID: {{ selectedCourseId }}
</p>
}

@if (isLoading) {

    <p>Loading courses...</p>

} @else {

    @if (courses.length > 0) {

        @for (c of courses; track c.id) {
            <app-course-card
                [course]="c"
                (enrollRequested)="onEnroll($event)">
            </app-course-card>
        }

    } @else {

        <p>No courses available.</p>

    }

}
